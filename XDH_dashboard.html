<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>XDH Market Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Arial;
background:#0a0f1a;
color:white;
margin:0;
}

header{
background:#111827;
padding:14px;
display:flex;
justify-content:space-between;
align-items:center;
}

h2{margin:0}

.section{
max-width:1500px;
margin:auto;
padding:20px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:14px;
}

.card{
background:#1e293b;
padding:12px;
border-radius:8px;
}

.price{
font-size:22px;
}

.change{
font-size:14px;
}

.up{color:#22c55e}
.down{color:#ef4444}

canvas{
height:70px!important
}

#ticker{
background:black;
padding:8px;
white-space:nowrap;
overflow:hidden;
}

#ticker span{
margin-right:35px;
font-weight:bold;
}

</style>
</head>

<body>

<header>
<h2>Lao Hu Market Watch</h2>
<div id="status"></div>
</header>

<div id="ticker"></div>

<div class="section">

<h3>Market Indices (ETF proxies)</h3>
<div class="grid" id="indices"></div>

<h3>Stocks</h3>
<div class="grid" id="stocks"></div>

<h3>Technology / AI ETFs</h3>
<div class="grid" id="etfs"></div>

<h3>Metals ETFs</h3>
<div class="grid" id="metals"></div>

<h3>Energy</h3>
<div class="grid" id="energy"></div>

<h3>Bond Yields (ETF proxies)</h3>
<div class="grid" id="bonds"></div>

<h3>Crypto (Realtime)</h3>
<div class="grid" id="crypto"></div>

</div>

<script>

/* FINNHUB KEY */

const api="d6qqkmpr01qgdhqc0ol0d6qqkmpr01qgdhqc0olg";

/* INDEX PROXIES */

const indices=[
{symbol:"SPY",name:"S&P 500"},
{symbol:"DIA",name:"Dow"},
{symbol:"QQQ",name:"NASDAQ"},
{symbol:"VIXY",name:"VIX Short"},
{symbol:"VIXM",name:"VIX Mid"}
];

/* STOCKS */

const stocks=[
"TSLA","FSLR","CVX","GD","GILD"
];

/* TECH ETFs */

const etfs=[
"AIQ","SMH","ARKW","VXUS"
];

/* METALS */

const metals=[
{symbol:"IAU",name:"Gold"},
{symbol:"IAUM",name:"Gold Mini"},
{symbol:"SLV",name:"Silver"}
];

/* ENERGY */

const energy=[
{symbol:"XLE",name:"Energy Sector"},
{symbol:"USO",name:"Oil ETF"},
{symbol:"UNG",name:"Natural Gas"}
];

/* BONDS */

const bonds=[
{symbol:"TLT",name:"20Y Treasury"},
{symbol:"SHY",name:"1-3Y Treasury"}
];

/* CRYPTO */

const crypto=[
"BINANCE:BTCUSDT",
"BINANCE:ETHUSDT",
"BINANCE:LTCUSDT"
];


/* CARD CREATOR */

function createCards(list,id){

const grid=document.getElementById(id);

list.forEach(asset=>{

const symbol=asset.symbol||asset;
const name=asset.name||asset;

const card=document.createElement("div");

card.className="card";

card.innerHTML=`
<h4>${name}</h4>
<div id="${symbol}" class="price">--</div>
<div id="${symbol}-change" class="change">--</div>
<canvas id="chart-${symbol}"></canvas>
`;

grid.appendChild(card);

});

}

createCards(indices,"indices");
createCards(stocks,"stocks");
createCards(etfs,"etfs");
createCards(metals,"metals");
createCards(energy,"energy");
createCards(bonds,"bonds");
createCards(crypto,"crypto");


/* CHART STORAGE */

const charts={};

function updateChart(symbol,price){

if(!charts[symbol]){

charts[symbol]=new Chart(
document.getElementById("chart-"+symbol),
{
type:"line",
data:{
labels:[],
datasets:[{
data:[],
borderColor:"#4ade80",
borderWidth:2,
pointRadius:0
}]
},
options:{
plugins:{legend:{display:false}},
scales:{x:{display:false},y:{display:false}}
}
});

}

const chart=charts[symbol];

chart.data.labels.push("");
chart.data.datasets[0].data.push(price);

if(chart.data.labels.length>25){

chart.data.labels.shift();
chart.data.datasets[0].data.shift();

}

chart.update();

}


/* TICKER */

function updateTicker(symbol,price,change){

const ticker=document.getElementById("ticker");

const span=document.createElement("span");

span.innerText=`${symbol} ${price} ${change}%`;

span.className=change>=0?"up":"down";

ticker.appendChild(span);

if(ticker.children.length>50){

ticker.removeChild(ticker.firstChild);

}

}


/* LOAD QUOTES */

async function loadQuotes(){

const list=[
...indices.map(i=>i.symbol),
...stocks,
...etfs,
...metals.map(m=>m.symbol),
...energy.map(e=>e.symbol),
...bonds.map(b=>b.symbol)
];

for(const symbol of list){

try{

const url=`https://finnhub.io/api/v1/quote?symbol=${symbol}&token=${api}`;

const res=await fetch(url);

const data=await res.json();

if(!data.c)continue;

const price=data.c;

const change=((data.c-data.pc)/data.pc*100).toFixed(2);

document.getElementById(symbol).innerText="$"+price.toFixed(2);

const changeEl=document.getElementById(symbol+"-change");

changeEl.innerText=change+"%";

changeEl.className=change>=0?"change up":"change down";

updateChart(symbol,price);

updateTicker(symbol,price,change);

}
catch{}

await new Promise(r=>setTimeout(r,200));

}

}

loadQuotes();

setInterval(loadQuotes,60000);


/* REALTIME CRYPTO */

const socket=new WebSocket(`wss://ws.finnhub.io?token=${api}`);

socket.addEventListener("open",()=>{

crypto.forEach(symbol=>{

socket.send(JSON.stringify({
type:"subscribe",
symbol:symbol
}));

});

});

socket.addEventListener("message",(event)=>{

const msg=JSON.parse(event.data);

if(!msg.data)return;

msg.data.forEach(trade=>{

document.getElementById(trade.s).innerText="$"+trade.p;

updateChart(trade.s,trade.p);

});

});


/* MARKET STATUS */

function marketStatus(){

const now=new Date();
const hour=now.getUTCHours();

const open=(hour>=14 && hour<=21);

document.getElementById("status").innerText=open?
"US Market OPEN":"US Market CLOSED";

}

marketStatus();

</script>

</body>
</html>
