<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>XDH Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Arial;
background:#0b1220;
color:white;
margin:0;
}

header{
background:#111827;
padding:15px;
display:flex;
justify-content:space-between;
}

.section{
max-width:1400px;
margin:auto;
padding:20px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:15px;
}

.card{
background:#1e293b;
padding:15px;
border-radius:8px;
}

.price{
font-size:22px;
}

.change{
font-size:14px;
}

.up{color:#22c55e;}
.down{color:#ef4444;}

canvas{
height:70px !important;
}

</style>
</head>

<body>

<header>
<h2>Lao Hu Market Dashboard</h2>
<div id="status">Loading...</div>
</header>

<div class="section">

<h3>Market Indices (ETF Proxies)</h3>
<div class="grid" id="indices"></div>

<h3>Stocks</h3>
<div class="grid" id="stocks"></div>

<h3>ETFs</h3>
<div class="grid" id="etfs"></div>

<h3>Metals ETFs</h3>
<div class="grid" id="metals"></div>

<h3>Crypto (Realtime)</h3>
<div class="grid" id="crypto"></div>

</div>

<script>

/* FINNHUB KEY */

const finnhub="d6qqkmpr01qgdhqc0ol0d6qqkmpr01qgdhqc0olg";

/* ETF PROXIES */

const indices=[
{symbol:"SPY",name:"S&P 500"},
{symbol:"DIA",name:"Dow Jones"},
{symbol:"QQQ",name:"NASDAQ"},
{symbol:"VIXY",name:"Short VIX"},
{symbol:"VIXM",name:"Mid VIX"}
];

/* STOCKS */

const stocks=[
"TSLA","FSLR","CVX","GD","GILD"
];

/* ETFs */

const etfs=[
"VXUS","AIQ","SMH","ARKW"
];

/* METAL ETFs */

const metals=[
{symbol:"IAU",name:"Gold"},
{symbol:"IAUM",name:"Gold Mini"},
{symbol:"SLV",name:"Silver"}
];

/* CRYPTO */

const crypto=[
"BINANCE:BTCUSDT",
"BINANCE:ETHUSDT",
"BINANCE:LTCUSDT"
];

/* CREATE CARDS */

function createCards(list,id){

const grid=document.getElementById(id);

list.forEach(asset=>{

const symbol=asset.symbol || asset;
const name=asset.name || asset;

const card=document.createElement("div");

card.className="card";

card.innerHTML=`
<h4>${name}</h4>
<div id="${symbol}" class="price">--</div>
<div id="${symbol}-change" class="change">--</div>
<canvas id="chart-${symbol}"></canvas>
`;

grid.appendChild(card);

});

}

createCards(indices,"indices");
createCards(stocks,"stocks");
createCards(etfs,"etfs");
createCards(metals,"metals");
createCards(crypto,"crypto");


/* CHART STORAGE */

const charts={};

function updateChart(symbol,price){

if(!charts[symbol]){

charts[symbol]=new Chart(
document.getElementById("chart-"+symbol),
{
type:"line",
data:{
labels:[],
datasets:[{
data:[],
borderColor:"#4ade80",
pointRadius:0,
borderWidth:2
}]
},
options:{
plugins:{legend:{display:false}},
scales:{x:{display:false},y:{display:false}}
}
});

}

const chart=charts[symbol];

chart.data.labels.push("");
chart.data.datasets[0].data.push(price);

if(chart.data.labels.length>25){

chart.data.labels.shift();
chart.data.datasets[0].data.shift();

}

chart.update();

}


/* FINNHUB QUOTES */

async function loadQuotes(){

const list=[
...indices.map(i=>i.symbol),
...stocks,
...etfs,
...metals.map(m=>m.symbol)
];

for(const symbol of list){

try{

const url=`https://finnhub.io/api/v1/quote?symbol=${symbol}&token=${finnhub}`;

const res=await fetch(url);

const data=await res.json();

if(!data.c)continue;

const price=data.c;

const change=((data.c-data.pc)/data.pc*100).toFixed(2);

document.getElementById(symbol).innerText="$"+price.toFixed(2);

const changeEl=document.getElementById(symbol+"-change");

changeEl.innerText=change+"%";

changeEl.className=change>=0?"change up":"change down";

updateChart(symbol,price);

}
catch{}

await new Promise(r=>setTimeout(r,200));

}

}

loadQuotes();

setInterval(loadQuotes,60000);


/* CRYPTO REALTIME */

const socket=new WebSocket(`wss://ws.finnhub.io?token=${finnhub}`);

socket.addEventListener("open",()=>{

crypto.forEach(symbol=>{

socket.send(JSON.stringify({
type:"subscribe",
symbol:symbol
}));

});

});

socket.addEventListener("message",(event)=>{

const msg=JSON.parse(event.data);

if(!msg.data)return;

msg.data.forEach(trade=>{

document.getElementById(trade.s).innerText="$"+trade.p;

updateChart(trade.s,trade.p);

});

});


/* MARKET STATUS */

function marketStatus(){

const now=new Date();
const hour=now.getUTCHours();

const open=(hour>=14 && hour<=21);

document.getElementById("status").innerText=open?
"US Market OPEN":"US Market CLOSED";

}

marketStatus();

</script>

</body>
</html>
