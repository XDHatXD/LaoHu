<!DOCTYPE html>
<html>
<head>
    <title>US Economy Health Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: white;
            margin: 0;
        }

        h1 {
            text-align: center;
            padding: 15px;
        }

        h2 {
            margin-left: 15px;
            margin-top: 25px;
            color: #94a3b8;
        }

        .section {
            padding: 10px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 8px;
            padding: 10px;
        }

        .card {
            background: #1e293b;
            padding: 15px;
            border-radius: 12px;
        }

        .value {
            font-size: 22px;
            margin: 6px 0;
        }

        canvas {
            height: 160px !important;
        }

        .summary {
            text-align: center;
            font-size: 26px;
            margin: 15px;
        }

        .green { color: #22c55e; }
        .yellow { color: #eab308; }
        .red { color: #ef4444; }

    </style>
</head>

<body>

<h1>US Economy Health Dashboard</h1>
<a href="index.html" target="_blank">Click HERE for Market News and Data</a>
<div id="summary" class="summary"></div>

<!-- 🏠 Housing & Rates -->
<div class="section">
    <h2>🏠 Mortgage & Interest Rates</h2>
    <div class="grid" id="rates"></div>
</div>

<!-- 📊 Inflation & Labor -->
<div class="section">
    <h2>📊 Inflation & Labor</h2>
    <div class="grid" id="macro"></div>
</div>

<!-- 🌍 Global -->
<div class="section">
    <h2>🌍 Global FX Rates</h2>
    <div class="grid" id="fx"></div>
    <div class="section">
    <h2>💱 Live FX & USD Strength</h2>
    <div id="fx-live" class="grid"></div>
</div>
 
<script>

const API_KEY = "586b60806b6165a523f3854547237861";

const groups = {
    rates: [
        { name: "30Y Mortgage", id: "MORTGAGE30US", unit: "%" },
        { name: "15Y Mortgage", id: "MORTGAGE15US", unit: "%" },
        { name: "4Y Treasury Yield", id: "TY48MCD", unit: "%" }
    ],
    macro: [
        { name: "Consumer Price Index", id: "CPIAUCSL", unit: "" },
        { name: "Unemployment Rate", id: "UNRATE", unit: "%" }
    ],
    fx: [
        { name: "Euro to USD", id: "DEXUSEU", unit: "" },
        { name: "USD to Chinese YUAN", id: "DEXCHUS", unit: "" },
        { name: "USD to Canadian DOLLAR", id: "DEXCAUS", unit: "" },
        { name: "USD to Swiss FRANC", id: "DEXSZUS", unit: "" },
        { name: "USD to Singapore DOLLAR", id: "DEXSIUS", unit: "" }
    ]
};

async function fetchSeries(seriesId) {
    try {
        const fredUrl = `https://api.stlouisfed.org/fred/series/observations?series_id=${seriesId}&api_key=${API_KEY}&file_type=json&sort_order=desc&limit=30`;
        const proxy = `https://corsproxy.io/?${encodeURIComponent(fredUrl)}`;

        const res = await fetch(proxy);
        const data = await res.json();

        let values = data.observations
            .map(o => o.value)
            .filter(v => v !== "." && !isNaN(parseFloat(v)))
            .map(Number);

        if (values.length === 0) return null;

        values = values.reverse();

        return values.slice(-12);

    } catch (err) {
        console.error("Error loading", seriesId, err);
        return null;
    }
}

function createChart(canvasId, data) {
    new Chart(document.getElementById(canvasId), {
        type: 'line',
        data: {
            labels: data.map((_, i) => i+1),
            datasets: [{
                data: data,
                borderWidth: 2,
                tension: 0.3
            }]
        },
        options: {
            plugins: { legend: { display: false }},
            scales: { x: { display: false }}
        }
    });
}

function addCard(containerId, ind, data) {

    if (!data || data.length === 0) {
        document.getElementById(containerId).innerHTML += `
            <div class="card">
                <div>${ind.name}</div>
                <div class="value">N/A</div>
            </div>
        `;
        return null;
    }

    const latest = data[data.length - 1];
    const prev = data[data.length - 2] || latest;

    const canvasId = ind.id;

    // Trend arrow
    let arrow = "→";
    let color = "white";

    if (latest > prev) {
        arrow = "▲";
        color = "#22c55e";
    } else if (latest < prev) {
        arrow = "▼";
        color = "#ef4444";
    }

    // FX uses 4 decimals
    const decimals = containerId === "fx" ? 4 : 2;

    document.getElementById(containerId).innerHTML += `
        <div class="card">
            <div>${ind.name}</div>
            <div class="value">${latest.toFixed(decimals)} ${ind.unit}</div>
            <div style="color:${color}">
                ${arrow} ${(latest - prev).toFixed(decimals)}
            </div>
            <canvas id="${canvasId}"></canvas>
        </div>
    `;

    if (data.length > 2) {
        setTimeout(() => createChart(canvasId, data), 100);
    }

    return latest;
}

async function loadDashboard() {

    // clear old data (important for refresh)
    document.getElementById("rates").innerHTML = "";
    document.getElementById("macro").innerHTML = "";
    document.getElementById("fx").innerHTML = "";

    let cpi, unrate, rate;

    for (let group in groups) {
        for (let ind of groups[group]) {

            const data = await fetchSeries(ind.id);

            const latest = addCard(group, ind, data);

            if (!latest) continue;

            if (ind.id === "CPIAUCSL") cpi = latest;
            if (ind.id === "UNRATE") unrate = latest;
            if (ind.id === "MORTGAGE30US") rate = latest;
        }
    }

    // Health Score
    let score = 100;
    if (cpi > 4) score -= 25;
    if (unrate > 5) score -= 25;
    if (rate > 5) score -= 25;

    let color = "green";
    if (score < 70) color = "yellow";
    if (score < 50) color = "red";

    let recession = (unrate > 4.5 && rate < 5)
        ? "🚨 Recession Risk Rising"
        : "✅ Stable";

    document.getElementById("summary").innerHTML = `
        <div class="${color}">🧠 Health Score: ${score}/100</div>
        <div>${recession}</div>
    `;
}

// 🔴 LIVE FX (real-time)
async function fetchLiveFX() {
    try {
        const res = await fetch("https://open.er-api.com/v6/latest/USD");
        const data = await res.json();
        return data.rates;
    } catch (err) {
        console.error("Live FX error", err);
        return null;
    }
}

// 🧠 USD Strength Index (simple basket)
function calculateUSDIndex(rates) {
    // Higher = stronger USD
    return (
        (1 / rates.EUR) * 0.3 +
        (rates.CNY) * 0.2 +
        (rates.CAD) * 0.2 +
        (rates.CHF) * 0.15 +
        (rates.SGD) * 0.15
    );
}

// 🎨 Heat color
function getColor(change) {
    if (change > 0) return "#22c55e";
    if (change < 0) return "#ef4444";
    return "white";
}

async function loadLiveFX() {

    const container = document.getElementById("fx-live");
    container.innerHTML = "";

    const rates = await fetchLiveFX();
    if (!rates) return;

    const pairs = [
        { name: "EUR/USD", val: rates.EUR },
        { name: "USD/CNY", val: rates.CNY },
        { name: "USD/CAD", val: rates.CAD },
        { name: "USD/CHF", val: rates.CHF },
        { name: "USD/SGD", val: rates.SGD }
    ];

    // fake previous (for demo trend)
    const prevRates = JSON.parse(localStorage.getItem("fx_prev")) || {};

    let strength = calculateUSDIndex(rates);
    let prevStrength = prevRates.index || strength;

    pairs.forEach(p => {

        const prev = prevRates[p.name] || p.val;
        const diff = p.val - prev;

        container.innerHTML += `
            <div class="card">
                <div>${p.name}</div>
                <div class="value">${p.val.toFixed(4)}</div>
                <div style="color:${getColor(diff)}">
                    ${diff > 0 ? "▲" : diff < 0 ? "▼" : "→"}
                    ${diff.toFixed(4)}
                </div>
            </div>
        `;

        prevRates[p.name] = p.val;
    });

    // USD Index card
    const indexDiff = strength - prevStrength;

    container.innerHTML += `
        <div class="card">
            <div>USD Strength Index</div>
            <div class="value">${strength.toFixed(3)}</div>
            <div style="color:${getColor(indexDiff)}">
                ${indexDiff > 0 ? "▲" : indexDiff < 0 ? "▼" : "→"}
                ${indexDiff.toFixed(3)}
            </div>
        </div>
    `;

    prevRates.index = strength;
    localStorage.setItem("fx_prev", JSON.stringify(prevRates));
}

// 🔄 Load together
async function initAll() {
    await loadDashboard();
    await loadLiveFX();
}

// Initial load
initAll();

// Auto refresh
setInterval(initAll, 300000);
</script>

</body>
</html>
