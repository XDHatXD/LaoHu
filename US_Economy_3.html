<!DOCTYPE html>
<html>
<head>
    <title>US Economy Health Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Chart.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.js"></script>

    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: white;
            margin: 0;
        }

        h1 {
            text-align: center;
            padding: 10px;
        }

        h2 {
            margin-left: 15px;
            margin-top: 25px;
            color: #94a3b8;
            border-bottom: 1px solid #334155;
            padding-bottom: 5px;
        }

        .section {
            padding: 10px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 14px;
            padding: 15px;
        }

        .card {
            background: #1e293b;
            padding: 14px;
            border-radius: 12px;
        }

        .value {
            font-size: 26px;
            margin: 10px 0;
        }

        canvas {
            height: 140px !important;
        }

        .summary {
            text-align: center;
            font-size: 20px;
            margin: 15px;
        }

        .green { color: #22c55e; }
        .yellow { color: #eab308; }
        .red { color: #ef4444; }
    </style>
</head>

<body>

<h1>US Economy Health Dashboard (FRED Data)</h1>

<div id="summary" class="summary"></div>

<div class="section">
    <h2>🏠 12 Month Mortgage & Interest Rate Trends</h2>
    <div class="grid" id="rates"></div>
</div>

<div class="section">
    <h2>📊 12 Month Inflation & Labor Trends</h2>
    <div class="grid" id="macro"></div>
</div>

<div class="section">
    <h2>🌍 12 Month Exchange Rate Changes</h2>
    <div class="grid" id="fx"></div>
</div>

<script>

const API_KEY = "586b60806b6165a523f3854547237861"; // ← replace

const chartStore = {}; // store chart instances

const groups = {
    rates: [
        { name: "30 Year Mortgage Rate", id: "MORTGAGE30US", unit: "%" },
        { name: "15 Year Mortgage Rate", id: "MORTGAGE15US", unit: "%" },
        { name: "4 Year Treasury Yield", id: "TY48MCD", unit: "%" }
    ],
    macro: [
        { name: "CPI (1982-1984 = 100)", id: "CPIAUCSL", unit: "" },
        { name: "Unemployment Rate", id: "UNRATE", unit: "%" }
    ],
    fx: [
        { name: "USD / EUR", id: "DEXUSEU", unit: "" },
        { name: "CNY / USD", id: "DEXCHUS", unit: "" },
        { name: "CAD / USD", id: "DEXCAUS", unit: "" }
    ]
};

async function fetchSeries(seriesId) {
    const fredUrl = `https://api.stlouisfed.org/fred/series/observations?series_id=${seriesId}&api_key=${API_KEY}&file_type=json&sort_order=desc&limit=24`;
    const proxy = `https://corsproxy.io/?${encodeURIComponent(fredUrl)}`;

    const res = await fetch(proxy);
    const data = await res.json();

    let values = data.observations
        .map(o => o.value)
        .filter(v => v !== "." && !isNaN(parseFloat(v)))
        .map(Number)
        .reverse();

    return values.slice(-12);
}

function createChart(canvasId, data) {
    if (chartStore[canvasId]) {
        chartStore[canvasId].data.datasets[0].data = data;
        chartStore[canvasId].update();
        return;
    }

    chartStore[canvasId] = new Chart(document.getElementById(canvasId), {
        type: 'line',
        data: {
            labels: data.map((_, i) => i + 1),
            datasets: [{
                data: data,
                borderWidth: 2,
                tension: 0.3
            }]
        },
        options: {
            plugins: { legend: { display: false }},
            scales: { x: { display: false }}
        }
    });
}

function addOrUpdateCard(containerId, ind, data) {
    const latest = data[data.length - 1];
    const cardId = `card-${ind.id}`;
    const canvasId = ind.id;

    let card = document.getElementById(cardId);

    if (!card) {
        document.getElementById(containerId).innerHTML += `
            <div class="card" id="${cardId}">
                <div>${ind.name}</div>
                <div class="value" id="value-${ind.id}"></div>
                <canvas id="${canvasId}"></canvas>
            </div>
        `;
    }

    document.getElementById(`value-${ind.id}`).innerText =
        `${latest.toFixed(2)} ${ind.unit}`;

    requestAnimationFrame(() => createChart(canvasId, data));

    return latest;
}

async function loadDashboard() {

    let cpi, unrate, rate;

    for (let group in groups) {
        for (let ind of groups[group]) {

            const data = await fetchSeries(ind.id);
            if (!data) continue;

            const latest = addOrUpdateCard(group, ind, data);

            if (ind.id === "CPIAUCSL") cpi = latest;
            if (ind.id === "UNRATE") unrate = latest;
            if (ind.id === "MORTGAGE30US") rate = latest;
        }
    }

    let score = 100;
    if (cpi > 4) score -= 25;
    if (unrate > 5) score -= 25;
    if (rate > 5) score -= 25;

    let color = "green";
    if (score < 70) color = "yellow";
    if (score < 50) color = "red";

    let recession = (unrate > 4.5 && rate < 5)
        ? "🚨 Recession Risk Rising"
        : "✅ Stable";

    document.getElementById("summary").innerHTML = `
        <div class="${color}">🧠 Health Score: ${score}/100</div>
        <div>${recession}</div>
    `;
}

// Initial load
loadDashboard();

// Auto refresh every 5 min
setInterval(loadDashboard, 300000);

</script>

</body>
</html>
