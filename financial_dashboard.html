<!DOCTYPE html>
<html>

<head>
    <title>Financial Dashboard</title>

    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: white;
            text-align: center;
        }

        h1 {
            margin-top: 30px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 20px;
            max-width: 900px;
            margin: 40px auto;
        }

        .card {
            background: #1e293b;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.4);
        }

        .price {
            font-size: 26px;
            margin-top: 10px;
            color: #38bdf8;
        }
    </style>
</head>

<body>

    <h1>Live Financial Dashboard</h1>

    <div class="grid">

        <div class="card">
            <h3>Gold</h3>
            <div id="gold" class="price">Loading</div>
        </div>

        <div class="card">
            <h3>Silver</h3>
            <div id="silver" class="price">Loading</div>
        </div>

        <div class="card">
            <h3>Platinum</h3>
            <div id="platinum" class="price">Loading</div>
        </div>

        <div class="card">
            <h3>S&P 500</h3>
            <div id="sp500" class="price">Loading</div>
        </div>

        <div class="card">
            <h3>NASDAQ</h3>
            <div id="nasdaq" class="price">Loading</div>
        </div>

        <div class="card">
            <h3>Apple</h3>
            <div id="apple" class="price">Loading</div>
        </div>

        <div class="card">
            <h3>Tesla</h3>
            <div id="tesla" class="price">Loading</div>
        </div>

        <div class="card">
            <h3>Bitcoin</h3>
            <div id="btc" class="price">Loading</div>
        </div>

    </div>
<script>
const socket = new WebSocket(
  "wss://quote.alltick.io/quote-b-ws?token=e7e4ed91556c4410b8947617bbd212d9b50efc3dd4ec4c74b72e5d65dd29d460"
);

const map = {
  XAUUSD: "gold",
  XAGUSD: "silver",
  XPTUSD: "platinum",
  SPX: "sp500",
  NDX: "nasdaq",
  AAPL: "apple",
  TSLA: "tesla",
  BTCUSD: "btc"
};

socket.onopen = () => {
  socket.send(JSON.stringify({
    cmd: "subscribe",
    args: Object.keys(map)
  }));
};

socket.onmessage = (event) => {
  const msg = JSON.parse(event.data);
  if (!msg.data) return;

  msg.data.forEach(item => {
    const el = document.getElementById(map[item.symbol]);
    if (el && item.last) {
      el.innerText =
        (item.symbol.includes("USD") || item.symbol === "BTCUSD"
          ? "$"
          : "") + item.last.toFixed(2);
    }
  });
};

socket.onerror = err => console.error("WS error", err);
</script>
    
</body>

</html>
