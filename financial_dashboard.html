<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Alpha Vantage Rate-Limited Dashboard</title>
<style>
body { font-family: Arial, sans-serif; background: #0f172a; color: white; text-align: center; }
h1 { margin-top: 20px; }
.grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; max-width: 1200px; margin: 40px auto; }
.card { background: #1e293b; padding: 20px; border-radius: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.4); }
.price { font-size: 22px; margin-top: 10px; color: #38bdf8; }
.change { font-size: 18px; margin-top: 5px; }
.up { color: #22c55e; }
.down { color: #ef4444; }
</style>
</head>
<body>

<h1>Alpha Vantage Rate-Limited Dashboard</h1>
<div class="grid" id="dashboard"></div>

<script>
const apiKey = "0YR1TG36FAX42RAH";

// All assets
const assets = [
  // Metals
  {type:"FOREX", symbol:"XAUUSD", name:"Gold"},
  {type:"FOREX", symbol:"XAGUSD", name:"Silver"},
  {type:"FOREX", symbol:"XPTUSD", name:"Platinum"},
  // Cryptos
  {type:"CRYPTO", symbol:"BTCUSD", name:"Bitcoin"},
  {type:"CRYPTO", symbol:"ETHUSD", name:"Ethereum"},
  {type:"CRYPTO", symbol:"LTCUSD", name:"Litecoin"},
  // Indices
  {type:"STOCK", symbol:"DJI", name:"DOW"},
  {type:"STOCK", symbol:"^IXIC", name:"NASDAQ"},
  {type:"STOCK", symbol:"^GSPC", name:"S&P 500"},
  // Stocks
  {type:"STOCK", symbol:"VXUS", name:"VXUS"},
  {type:"STOCK", symbol:"IAU", name:"IAU"},
  {type:"STOCK", symbol:"IAUM", name:"IAUM"},
  {type:"STOCK", symbol:"SLV", name:"SLV"},
  {type:"STOCK", symbol:"TSLA", name:"TSLA"},
  {type:"STOCK", symbol:"FSLR", name:"FSLR"},
  {type:"STOCK", symbol:"CVX", name:"CVX"},
  {type:"STOCK", symbol:"GD", name:"GD"},
  {type:"STOCK", symbol:"GILD", name:"GILD"},
  {type:"STOCK", symbol:"AIQ", name:"AIQ"},
  {type:"STOCK", symbol:"SMH", name:"SMH"},
  {type:"STOCK", symbol:"FSPTX", name:"FSPTX"},
  {type:"STOCK", symbol:"ARKW", name:"ARKW"}
];

// Create dashboard cards
const dashboard = document.getElementById("dashboard");
assets.forEach(asset=>{
  const card = document.createElement("div");
  card.className = "card";
  card.innerHTML = `<h3>${asset.name}</h3>
                    <div id="${asset.symbol}" class="price">Loading...</div>
                    <div id="${asset.symbol}-change" class="change">--</div>`;
  dashboard.appendChild(card);
});

// Split assets into batches of 5
function chunkArray(array, size){
  const result = [];
  for(let i=0; i<array.length; i+=size){
    result.push(array.slice(i,i+size));
  }
  return result;
}

const batches = chunkArray(assets, 5); // 5 requests per minute
let currentBatch = 0;

// Fetch single asset
async function fetchAsset(asset){
  try{
    let url="";
    if(asset.type==="STOCK"){
      url=`https://www.alphavantage.co/query?function=GLOBAL_QUOTE&symbol=${asset.symbol}&apikey=${apiKey}`;
      const response = await fetch(url);
      const data = await response.json();
      const quote = data["Global Quote"];
      if(quote){
        const price=parseFloat(quote["05. price"]).toFixed(2);
        const changePercent=parseFloat(quote["10. change percent"]).toFixed(2);
        document.getElementById(asset.symbol).innerText="$"+price;
        document.getElementById(asset.symbol+"-change").innerHTML=`<span class="${changePercent>=0?'up':'down'}">${changePercent}%</span>`;
      }
    } else if(asset.type==="CRYPTO" || asset.type==="FOREX"){
      let from=asset.symbol.slice(0,3);
      let to=asset.symbol.slice(3,6);
      url=`https://www.alphavantage.co/query?function=CURRENCY_EXCHANGE_RATE&from_currency=${from}&to_currency=${to}&apikey=${apiKey}`;
      const response = await fetch(url);
      const data = await response.json();
      const rateObj = data["Realtime Currency Exchange Rate"];
      if(rateObj){
        const price=parseFloat(rateObj["5. Exchange Rate"]).toFixed(2);
        document.getElementById(asset.symbol).innerText="$"+price;
        document.getElementById(asset.symbol+"-change").innerText="--";
      }
    }
  } catch(e){
    console.error(`Error fetching ${asset.name}:`,e);
    document.getElementById(asset.symbol).innerText="Error";
    document.getElementById(asset.symbol+"-change").innerText="--";
  }
}

// Fetch one batch per minute
async function fetchBatch(batch){
  batch.forEach(fetchAsset);
}

// Rotate batches
function rotateBatches(){
  fetchBatch(batches[currentBatch]);
  currentBatch = (currentBatch + 1) % batches.length;
}

// Initial fetch
rotateBatches();
setInterval(rotateBatches, 60000); // 1 batch per minute
</script>
</body>
</html>
