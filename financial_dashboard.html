<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Optimized Finnhub Dashboard</title>
<style>
body { font-family: Arial, sans-serif; background: #0f172a; color: white; text-align: center; }
h1 { margin-top: 20px; }
.grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; max-width: 1200px; margin: 40px auto; }
.card { background: #1e293b; padding: 20px; border-radius: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.4); }
.price { font-size: 22px; margin-top: 10px; color: #38bdf8; }
.change { font-size: 18px; margin-top: 5px; }
.up { color: #22c55e; }
.down { color: #ef4444; }
</style>
</head>
<body>

<h1>Optimized Finnhub Dashboard</h1>
<div class="grid" id="dashboard"></div>

<script>
const apiKey = "d6qenupr01qhcrmjttdgd6qenupr01qhcrmjtte0";

// Assets
const assets = [
  {type:"METAL", symbol:"XAUUSD", name:"Gold"},
  {type:"METAL", symbol:"XAGUSD", name:"Silver"},
  {type:"METAL", symbol:"XPTUSD", name:"Platinum"},
  {type:"CRYPTO", symbol:"BINANCE:BTCUSDT", name:"Bitcoin"},
  {type:"CRYPTO", symbol:"BINANCE:ETHUSDT", name:"Ethereum"},
  {type:"CRYPTO", symbol:"BINANCE:LTCUSDT", name:"Litecoin"},
  {type:"INDEX", symbol:"INDEX:DJI", name:"DOW"},
  {type:"INDEX", symbol:"INDEX:IXIC", name:"NASDAQ"},
  {type:"INDEX", symbol:"INDEX:SPX", name:"S&P 500"},
  {type:"STOCK", symbol:"NYSE:VXUS", name:"VXUS"},
  {type:"STOCK", symbol:"NYSE:IAU", name:"IAU"},
  {type:"STOCK", symbol:"NASDAQ:IAUM", name:"IAUM"},
  {type:"STOCK", symbol:"NYSE:SLV", name:"SLV"},
  {type:"STOCK", symbol:"NASDAQ:TSLA", name:"TSLA"},
  {type:"NASDAQ:FSLR", name:"FSLR"},
  {type:"NYSE:CVX", name:"CVX"},
  {type:"NYSE:GD", name:"GD"},
  {type:"NASDAQ:GILD", name:"GILD"},
  {type:"NYSE:AIQ", name:"AIQ"},
  {type:"NYSE:SMH", name:"SMH"},
  {type:"FSPTX", name:"FSPTX"},
  {type:"ARKW", name:"ARKW"}
];

// Create dashboard cards
const dashboard = document.getElementById("dashboard");
assets.forEach(asset=>{
  const card = document.createElement("div");
  card.className = "card";
  card.innerHTML = `<h3>${asset.name}</h3>
                    <div id="${asset.symbol}" class="price">Loading...</div>
                    <div id="${asset.symbol}-change" class="change">--</div>`;
  dashboard.appendChild(card);
});

// Fetch single asset
async function fetchAsset(asset){
  try{
    let url = `https://finnhub.io/api/v1/quote?symbol=${asset.symbol}&token=${apiKey}`;
    const response = await fetch(url);
    const data = await response.json();
    if(data && data.c){
      const price = parseFloat(data.c).toFixed(2);
      const change = parseFloat(((data.c - data.pc)/data.pc)*100).toFixed(2);
      document.getElementById(asset.symbol).innerText="$"+price;
      document.getElementById(asset.symbol+"-change").innerHTML=`<span class="${change>=0?'up':'down'}">${change}%</span>`;
    }
  } catch(e){
    console.error(`Error fetching ${asset.name}:`, e);
    document.getElementById(asset.symbol).innerText="Error";
    document.getElementById(asset.symbol+"-change").innerText="--";
  }
}

// Sequential fetch to prevent browser throttling
async function fetchAllSequentially(){
  for(let i=0; i<assets.length; i++){
    await fetchAsset(assets[i]);
    await new Promise(r => setTimeout(r, 200)); // 200ms delay between requests
  }
}

// Initial fetch + refresh every 30 seconds
fetchAllSequentially();
setInterval(fetchAllSequentially, 30000);
</script>

</body>
</html>
